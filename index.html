<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UTU EXECUTIVE SAFARIS</title>
  </head>
  <body>
    <!-- Hidden form for Netlify detection -->
    <form name="contact" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="travelDates" />
      <input type="text" name="groupSize" />
      <select name="destination">
        <option>Kenya</option>
        <option>Tanzania</option>
        <option>Uganda</option>
        <option>Rwanda</option>
      </select>
      <select name="product">
        <option>Game Drive Safari</option>
        <option>Airport Transfer</option>
        <option>Hotel Booking</option>
        <option>Hiking Adventure</option>
        <option>Tour Van/Cruiser</option>
        <option>Hot Air Balloon</option>
        <option>Mountain Climbing</option>
        <option>Rafting</option>
        <option>VIP Transportation</option>
        <option>Private Chef</option>
        <option>Sporting Activities</option>
      </select>
      <input type="number" name="days" />
      <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
